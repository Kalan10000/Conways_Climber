<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Conway - Menu</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        h1 { font-size: 3rem; margin-bottom: 40px; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 1.2rem; cursor: pointer; text-decoration: none; color: white; background: #444; border: none; border-radius: 5px; display: inline-block; }
        .btn:hover { background: #666; }
    </style>
</head>
<body>
    <h1>3D Conway</h1>
    <a href="main.html" class="btn">Play Game</a>
    <button class="btn" onclick="downloadGame()">Download Game</button>

    <script>
        async function downloadGame() {
            try {
                // Fetch the main.html file
                const response = await fetch('main.html');
                const blob = await response.blob();
                
                // Create a temporary link to trigger the download
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'main.html';
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (err) {
                alert("Download failed. Please ensure you are running this through a local server (like Live Server in VS Code) to allow file access.");
                console.error(err);
            }
        }
    </script>
</body>
</html>
